name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish GitHub Release (requires running on a tag ref)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-checks:
    name: Release checks
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.value }}
      should_publish: ${{ steps.publish.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Read package version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          if [[ -z "${version}" ]]; then
            echo "Could not read package version from Cargo.toml" >&2
            exit 1
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          expected="v${{ steps.version.outputs.value }}"
          if [[ "${GITHUB_REF_NAME}" != "${expected}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${expected}" >&2
            exit 1
          fi

      - name: Decide publish mode
        id: publish
        shell: bash
        env:
          REQUESTED_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && inputs.publish || 'false' }}
        run: |
          set -euo pipefail
          should_publish="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            should_publish="true"
          elif [[ "${REQUESTED_PUBLISH}" == "true" ]]; then
            if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
              echo "workflow_dispatch with publish=true must run on a tag ref." >&2
              exit 1
            fi
            should_publish="true"
          fi

          echo "value=${should_publish}" >> "$GITHUB_OUTPUT"

  release-e2e:
    name: Release E2E
    needs: release-checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate E2E scripts
        run: bash -n scripts/e2e/common.sh scripts/e2e/bootstrap.sh scripts/e2e/down.sh

      - name: Start Docker GitBucket and bootstrap E2E data
        run: ./scripts/e2e/bootstrap.sh

      - name: Load E2E runtime environment
        run: sed 's/^export //' ./.tmp/e2e/runtime.env >> "$GITHUB_ENV"

      - name: Run E2E tests
        run: cargo test --test e2e_test -- --ignored --nocapture

      - name: Tear down Docker GitBucket
        if: always()
        run: ./scripts/e2e/down.sh

  build-release-assets:
    name: Package ${{ matrix.target }}
    needs:
      - release-checks
      - release-e2e
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary_name: gitbucket-mcp-server
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary_name: gitbucket-mcp-server
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: gitbucket-mcp-server
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary_name: gitbucket-mcp-server.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.release-checks.outputs.version }}"
          archive_base="gitbucket-mcp-server-${version}-${{ matrix.target }}"
          archive_dir="dist/${archive_base}"
          mkdir -p "${archive_dir}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${archive_dir}/gitbucket-mcp-server"
          cp README.md LICENSE VERIFICATION.md "${archive_dir}/"
          tar -C dist -czf "dist/${archive_base}.${{ matrix.archive_ext }}" "${archive_base}"
          (
            cd dist
            shasum -a 256 "${archive_base}.${{ matrix.archive_ext }}" > "${archive_base}.${{ matrix.archive_ext }}.sha256"
          )

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.release-checks.outputs.version }}"
          $archiveBase = "gitbucket-mcp-server-$version-${{ matrix.target }}"
          $archiveDir = Join-Path "dist" $archiveBase
          New-Item -ItemType Directory -Force -Path $archiveDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" (Join-Path $archiveDir "gitbucket-mcp-server.exe")
          Copy-Item README.md, LICENSE, VERIFICATION.md $archiveDir
          Push-Location "dist"
          try {
            Compress-Archive -Path $archiveBase -DestinationPath "$archiveBase.${{ matrix.archive_ext }}" -Force
          }
          finally {
            Pop-Location
          }
          $hash = (Get-FileHash "dist/$archiveBase.${{ matrix.archive_ext }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  $archiveBase.${{ matrix.archive_ext }}" | Set-Content "dist/$archiveBase.${{ matrix.archive_ext }}.sha256"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish-github-release:
    name: Publish GitHub Release
    if: needs.release-checks.outputs.should_publish == 'true'
    needs:
      - release-checks
      - release-e2e
      - build-release-assets
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.release-checks.outputs.version, '-') }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
